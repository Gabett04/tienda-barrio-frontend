<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <title>Tienda Barrio - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏪</h1>
            <h2>Tienda Barrio</h2>
            <p>Sistema de gestión para tu negocio</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="codigoTienda">Código de Tienda</label>
                <input type="text" id="codigoTienda" placeholder="Ej: TDA-002" required autocomplete="off" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Tu usuario" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            <button type="submit" class="btn-login">🔐 Iniciar Sesión</button>
            <div id="mensajeError" class="mensaje-error" style="display: none;"></div>
        </form>
        <div class="login-footer">
            <p>¿Primera vez? Pide tus credenciales al administrador</p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(r => console.log('✅ SW registrado')).catch(e => console.log('❌ SW error'));
            });
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
