<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventario - Tienda Barrio</title>
    <link rel="stylesheet" href="../css/inventario.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/ventas.css">
</head>
<body>
    <header class="top-bar">
        <div class="tienda-info">
            <h1>🏪 <span id="nombreTienda">Cargando...</span></h1>
            <span id="codigoTienda" class="codigo"></span>
        </div>
        <nav class="pc-nav">
            <a href="dashboard.html">🏠 Inicio</a>
            <a href="ventas.html">💰 Ventas</a>
            <a href="inventario.html" class="active">📦 Inventario</a>
            <a href="gastos.html">💸 Gastos</a>
            <a href="fiao.html">👥 Crédito</a>
            <a href="reportes.html">📊 Reportes</a>
        </nav>
        <button onclick="mostrarFormulario()" class="btn-agregar">+ Nuevo</button>
        <div class="user-info">
            <span id="nombreUsuario"></span>
            <button onclick="cerrarSesion()" class="btn-logout">🚪</button>
        </div>
    </header>

    <main class="inventario-content">
        <div class="buscador">
            <input type="text" id="buscarInventario" placeholder="🔍 Buscar..." autocomplete="off">
            <select id="filtroCategoria">
                <option value="todas">Todas</option>
                <option value="Abarrotes">Abarrotes</option>
                <option value="Lácteos y Huevos">Lácteos</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Golosinas y Paquetes">Golosinas</option>
                <option value="Pan y Repostería">Pan</option>
                <option value="Aseo Personal">Aseo Personal</option>
                <option value="Aseo Hogar">Aseo Hogar</option>
                <option value="Miscelánea">Miscelánea</option>
            </select>
        </div>
        <div class="tabla-container">
            <table class="tabla-inventario">
                <thead><tr><th>Producto</th><th>Cat.</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead>
                <tbody id="tablaProductos"><tr><td colspan="5">Cargando...</td></tr></tbody>
            </table>
        </div>
    </main>

    <div id="modalProducto" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>📦 Producto</h2>
            <form id="formProducto">
                <input type="hidden" id="productoId">
                <div class="form-group"><label>Nombre *</label><input type="text" id="nombreProducto" required></div>
                <div class="form-group"><label>Categoría</label><select id="categoriaProducto"><option value="Abarrotes">Abarrotes</option><option value="Lácteos y Huevos">Lácteos</option><option value="Bebidas">Bebidas</option><option value="Golosinas y Paquetes">Golosinas</option><option value="Pan y Repostería">Pan</option><option value="Aseo Personal">Aseo Personal</option><option value="Aseo Hogar">Aseo Hogar</option><option value="Miscelánea">Miscelánea</option></select></div>
                <div class="form-group"><label>Unidad</label><select id="unidadProducto"><option value="UNIDAD">Unidad</option><option value="LIBRA">Libra (500g)</option><option value="KILO">Kilo</option><option value="LITRO">Litro</option><option value="BOLSA">Bolsa</option></select></div>
                <div class="form-group"><label>Precio *</label><input type="number" id="precioVenta" required step="100" min="100"></div>
                <div class="form-group"><label>Stock</label><input type="number" id="cantidadInicial" step="1" min="0" value="0"></div>
                <div class="modal-acciones">
                    <button type="button" onclick="cerrarModalProducto()" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-confirmar">💾 Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-text">Inicio</span></a>
        <a href="ventas.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">Ventas</span></a>
        <a href="inventario.html" class="nav-item active"><span class="nav-icon">📦</span><span class="nav-text">Inventario</span></a>
        <a href="gastos.html" class="nav-item"><span class="nav-icon">💸</span><span class="nav-text">Gastos</span></a>
        <a href="fiao.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">Crédito</span></a>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/sync.js"></script>
    <script src="../js/inventario.js"></script>
</body>
</html>
