<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gastos - Tienda Barrio</title>
    <link rel="stylesheet" href="../css/gastos.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/ventas.css">
    <style>
        body { overflow: auto !important; padding-bottom: 80px; }
        .gastos-content { max-height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        @media (max-width: 768px) {
            .gastos-content { max-height: calc(100vh - 180px); padding: 10px; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="tienda-info">
            <h1>🏪 <span id="nombreTienda">Cargando...</span></h1>
            <span id="codigoTienda" class="codigo"></span>
        </div>
        <nav class="pc-nav">
            <a href="dashboard.html">🏠 Inicio</a>
            <a href="ventas.html">💰 Ventas</a>
            <a href="inventario.html">📦 Inventario</a>
            <a href="gastos.html" class="active">💸 Gastos</a>
            <a href="fiao.html">👥 Crédito</a>
            <a href="reportes.html">📊 Reportes</a>
        </nav>
        <button onclick="mostrarFormulario()" class="btn-agregar">+ Nuevo</button>
        <div class="user-info">
            <span id="nombreUsuario"></span>
            <button onclick="cerrarSesion()" class="btn-logout">🚪</button>
        </div>
    </header>

    <main class="gastos-content">
        <div class="resumen-gastos">
            <div class="resumen-card"><h3>Gastos Hoy</h3><p id="gastosHoy">$0</p></div>
            <div class="resumen-card"><h3>Esta Semana</h3><p id="gastosSemana">$0</p></div>
            <div class="resumen-card"><h3>Este Mes</h3><p id="gastosMes">$0</p></div>
        </div>
        <div class="lista-gastos" id="listaGastos">
            <p class="text-center">No hay gastos registrados</p>
        </div>
    </main>

    <div id="modalGasto" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>💸 Registrar Gasto</h2>
            <form id="formGasto">
                <div class="form-group"><label>Categoría *</label><select id="categoriaGasto" required><option value="">Seleccionar...</option><option value="Mercancía">📦 Mercancía</option><option value="Transporte">🚗 Transporte</option><option value="Servicios">💡 Servicios (Luz, Agua)</option><option value="Empleado">👤 Pago Empleado</option><option value="Bolsas/Empaques">🛍️ Bolsas y Empaques</option><option value="Aseo Tienda">🧹 Aseo Tienda</option><option value="Otros">📋 Otros</option></select></div>
                <div class="form-group"><label>Descripción</label><input type="text" id="descripcionGasto" placeholder="Ej: Pago del día al ayudante"></div>
                <div class="form-group"><label>Monto * (múltiplo de $100)</label><input type="number" id="montoGasto" required placeholder="$" step="100" min="100"></div>
                <div class="modal-acciones">
                    <button type="button" onclick="cerrarModalGasto()" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-confirmar">💾 Guardar Gasto</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-text">Inicio</span></a>
        <a href="ventas.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">Ventas</span></a>
        <a href="inventario.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-text">Inventario</span></a>
        <a href="gastos.html" class="nav-item active"><span class="nav-icon">💸</span><span class="nav-text">Gastos</span></a>
        <a href="fiao.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">Crédito</span></a>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/sync.js"></script>
    <script src="../js/gastos.js"></script>
</body>
</html>
