<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crédito - Tienda Barrio</title>
    <link rel="stylesheet" href="../css/fiao.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/ventas.css">
    <style>
        body { overflow: auto !important; padding-bottom: 80px; }
        .fiao-content { max-height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        @media (max-width: 768px) {
            .fiao-content { max-height: calc(100vh - 180px); padding: 10px; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="tienda-info">
            <h1>🏪 <span id="nombreTienda">Cargando...</span></h1>
            <span id="codigoTienda" class="codigo"></span>
        </div>
        <nav class="pc-nav">
            <a href="dashboard.html">🏠 Inicio</a>
            <a href="ventas.html">💰 Ventas</a>
            <a href="inventario.html">📦 Inventario</a>
            <a href="gastos.html">💸 Gastos</a>
            <a href="fiao.html" class="active">👥 Crédito</a>
            <a href="reportes.html">📊 Reportes</a>
        </nav>
        <button onclick="mostrarFormulario()" class="btn-agregar">+ Nuevo</button>
        <div class="user-info">
            <span id="nombreUsuario"></span>
            <button onclick="cerrarSesion()" class="btn-logout">🚪</button>
        </div>
    </header>

    <main class="fiao-content">
        <div class="resumen-fiao">
            <div class="resumen-card"><h3>Total Prestado</h3><p id="totalPrestado">$0</p></div>
            <div class="resumen-card"><h3>Total Abonado</h3><p id="totalAbonado">$0</p></div>
            <div class="resumen-card"><h3>Saldo Pendiente</h3><p id="saldoPendiente">$0</p></div>
        </div>
        <div class="lista-clientes" id="listaClientes">
            <p class="text-center">No hay clientes con crédito</p>
        </div>
    </main>

    <div id="modalCliente" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>👤 Nuevo Cliente Crédito</h2>
            <form id="formCliente">
                <div class="form-group"><label>Nombre Completo *</label><input type="text" id="nombreCliente" required placeholder="Ej: María García"></div>
                <div class="form-group"><label>Apodo / Como lo conocen</label><input type="text" id="apodoCliente" placeholder="Ej: Doña Mary"></div>
                <div class="form-group"><label>Teléfono</label><input type="tel" id="telefonoCliente" placeholder="3101234567"></div>
                <div class="form-group"><label>Dirección</label><input type="text" id="direccionCliente" placeholder="Misma cuadra, casa azul"></div>
                <div class="form-group"><label>Cupo Máximo de Crédito *</label><input type="number" id="cupoCliente" required placeholder="$" step="100" min="100" value="50000"></div>
                <div class="modal-acciones">
                    <button type="button" onclick="cerrarModalCliente()" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-confirmar">💾 Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalAbono" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>💰 Registrar Abono</h2>
            <p id="nombreClienteAbono" style="font-size:18px;margin-bottom:10px;"></p>
            <p id="saldoClienteAbono" style="color:#666;margin-bottom:20px;"></p>
            <div class="form-group"><label>Monto del Abono *</label><input type="number" id="montoAbono" required placeholder="$" step="100" min="100"></div>
            <div class="modal-acciones">
                <button onclick="cerrarModalAbono()" class="btn-cancelar">Cancelar</button>
                <button onclick="registrarAbono()" class="btn-confirmar">✅ Registrar Abono</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-text">Inicio</span></a>
        <a href="ventas.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">Ventas</span></a>
        <a href="inventario.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-text">Inventario</span></a>
        <a href="gastos.html" class="nav-item"><span class="nav-icon">💸</span><span class="nav-text">Gastos</span></a>
        <a href="fiao.html" class="nav-item active"><span class="nav-icon">👥</span><span class="nav-text">Crédito</span></a>
    </nav>

    <script src="../js/config.js"></script>
    <script src="../js/fiao.js"></script>
</body>
</html>
